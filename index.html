<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI VAI AI SYSTEM</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url('https://cloudinary-marketing-res.cloudinary.com/image/upload/ar_0.5,c_fill,g_auto,w_433/q_auto/f_auto/hiking_dog_mountain.jpg') center/cover no-repeat;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BOX */
.box{
    width:340px;
    background:rgba(0,0,0,0.85);
    padding:20px;
    border-radius:15px;
    color:white;
    text-align:center;
}

/* LOGIN */
input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.login-btn{
    background:#00c853;
    color:white;
}

#error{color:red;margin-top:5px}

/* DASHBOARD */
#dashboard{display:none}

/* BIG SMALL */
.bs{
    font-size:30px;
    font-weight:bold;
    margin-top:10px;
}

/* COLORS */
.big{color:#00ff88;}
.small{color:#ff5252;}

/* NUMBER */
.num{
    font-size:22px;
    margin-top:8px;
    padding:10px;
    border:1px solid #00ff88;
    border-radius:10px;
}

/* TIMER */
.timer{
    margin-top:8px;
    color:yellow;
}

/* HISTORY */
.history{
    margin-top:10px;
    max-height:120px;
    overflow:auto;
    background:#111;
    padding:8px;
    border-radius:8px;
    text-align:left;
    font-size:13px;
}

.win{color:#00ff88;}
.jackpot{color:#ff9800;}

/* FLOAT BUTTON */
.float{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#2196f3;
    color:white;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    user-select:none;
}
</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="loginPage">
    <h1 style="color:#00ff88;">MEHEDI VAI AI SYSTEM</h1>

    <input type="password" id="password" placeholder="Enter Password">

    <button class="login-btn" onclick="login()">LOGIN</button>

    <div id="error"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <div class="timer">
        TIMER: <span id="time">30</span>s
    </div>

    <div class="bs" id="bs">BIG</div>

    <div class="num" id="num">0</div>

    <div class="history" id="history"></div>

</div>

</div>

<!-- FLOAT BUTTON -->
<div class="float" onclick="openSite()">
OPEN WEBSITE
</div>

<script>

let time = 30;
let locked = true;

let history = document.getElementById("history");

/* LOGIN */
function login(){

    let pass = document.getElementById("password").value;

    if(pass==="mehedi11"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("dashboard").style.display="block";

        startSystem();
    }else{
        document.getElementById("error").innerText="Wrong Password!";
    }
}

/* OPEN WEBSITE */
function openSite(){
    window.open('https://hgnice.bet/#/register?invitationCode=531211974484','_blank');
}

/* SYSTEM START */
function startSystem(){
    setInterval(timer,1000);
}

/* TIMER */
function timer(){

    time--;

    if(time<=0){
        time=30;
        locked=false;

        updateAll(); // ONLY UPDATE AFTER 30s
    }

    document.getElementById("time").innerText=time;
}

/* UPDATE SYSTEM */
function updateAll(){

    let num = Math.floor(Math.random()*10);

    let bs = num >= 5 ? "BIG" : "SMALL";

    let bsEl = document.getElementById("bs");
    let numEl = document.getElementById("num");

    bsEl.innerText = bs;
    numEl.innerText = num;

    bsEl.className = "bs " + (bs==="BIG" ? "big" : "small");

    // HISTORY UPDATE ONLY HERE
    let result = Math.random() > 0.5 ? "WIN" : "JACKPOT";

    let div = document.createElement("div");
    div.innerText = result;
    div.className = result==="WIN" ? "win" : "jackpot";

    history.prepend(div);
}

</script>

</body>
    </html>
