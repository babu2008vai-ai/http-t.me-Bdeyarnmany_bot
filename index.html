<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI VAI AI SYSTEM</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url('https://cloudinary-marketing-res.cloudinary.com/image/upload/ar_0.5,c_fill,g_auto,w_433/q_auto/f_auto/hiking_dog_mountain.jpg') center/cover no-repeat;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BOX */
.box{
    width:350px;
    background:rgba(0,0,0,0.85);
    padding:20px;
    border-radius:15px;
    color:white;
    text-align:center;
}

/* ANIMATED TITLE */
.title{
    font-size:18px;
    font-weight:bold;
    background:linear-gradient(90deg,#00ff88,#2196f3,#ff9800,#e91e63);
    -webkit-background-clip:text;
    color:transparent;
    animation:move 3s infinite linear;
}

@keyframes move{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}

/* LOGIN */
input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
}

button{
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.login-btn{
    width:100%;
    margin-top:10px;
    background:#00c853;
    color:white;
}

#error{color:red;margin-top:5px}

/* DASHBOARD */
#dashboard{display:none}

/* BIG SMALL */
.bs{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
}
.big{color:#00ff88;}
.small{color:#ff5252;}

/* NUMBER */
.num{
    font-size:22px;
    margin-top:8px;
    padding:10px;
    border:1px solid #00ff88;
    border-radius:10px;
}

/* TIMER */
.timer{
    margin-top:8px;
    color:yellow;
}

/* HISTORY */
.history{
    margin-top:10px;
    max-height:120px;
    overflow:auto;
    background:#111;
    padding:8px;
    border-radius:8px;
    font-size:13px;
}
.win{color:#00ff88;}
.jackpot{color:#ff9800;}

/* FLOAT BUTTONS (ALWAYS FIXED) */
.float-left,.float-right{
    position:fixed;
    bottom:20px;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:13px;
    z-index:999;
    display:none;
}

.float-left{left:20px;background:#9c27b0;}
.float-right{right:20px;background:#2196f3;}

/* AI PANEL */
.ai{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    background:#000;
    border:1px solid #00ff88;
    padding:15px;
    display:none;
    color:white;
    z-index:1000;
    animation:pop .3s ease;
}

@keyframes pop{
    from{transform:translate(-50%,-50%) scale(.6);opacity:0}
    to{transform:translate(-50%,-50%) scale(1);opacity:1}
}

.close{
    width:100%;
    background:red;
    color:white;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="loginPage">
    <div class="title">MEHEDI VAI AI SYSTEM</div>

    <input type="password" id="password" placeholder="Enter Password">

    <button class="login-btn" onclick="login()">LOGIN</button>

    <div id="error"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <div class="timer">
        TIMER: <span id="time">30</span>s
    </div>

    <div class="bs" id="bs">BIG</div>

    <div class="num" id="num">0</div>

    <div class="history" id="history"></div>

</div>

</div>

<!-- FLOAT BUTTONS -->
<div class="float-left" id="aiBtn" onclick="openAI()">AI BUTTON</div>
<div class="float-right" id="webBtn" onclick="openSite()">WEBSITE</div>

<!-- AI PANEL -->
<div class="ai" id="aiPanel">
    <h3 style="color:#00ff88;">AI SYSTEM PANEL</h3>
    <p>Running System Active...</p>
    <button class="close" onclick="closeAI()">CLOSE</button>
</div>

<script>

let time=30;
let history=document.getElementById("history");

/* LOGIN */
function login(){
    let pass=document.getElementById("password").value;

    if(pass==="mehedi11"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("dashboard").style.display="block";

        document.getElementById("aiBtn").style.display="block";
        document.getElementById("webBtn").style.display="block";

        setInterval(timer,1000);
    }else{
        document.getElementById("error").innerText="Wrong Password!";
    }
}

/* WEBSITE */
function openSite(){
    window.open('https://hgnice.bet/#/register?invitationCode=531211974484','_blank');
}

/* AI PANEL */
function openAI(){
    document.getElementById("aiPanel").style.display="block";
}
function closeAI(){
    document.getElementById("aiPanel").style.display="none";
}

/* TIMER */
function timer(){
    time--;

    if(time<=0){
        time=30;
        update();
    }

    document.getElementById("time").innerText=time;
}

/* UPDATE SYSTEM */
function update(){

    let num=Math.floor(Math.random()*10);
    let bs=num>=5?"BIG":"SMALL";

    document.getElementById("num").innerText=num;
    document.getElementById("bs").innerText=bs;

    document.getElementById("bs").className="bs "+(bs==="BIG"?"big":"small");

    let result=Math.random()>0.5?"WIN":"JACKPOT";

    let div=document.createElement("div");
    div.innerText=result;
    div.className=result==="WIN"?"win":"jackpot";

    history.prepend(div);
}

</script>

</body>
</html>
